name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.3

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install uv (Python 3.12)
        uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.12"

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      - name: Sync Python deps
        run: uv sync --directory packages/verify

      - name: Lint + typecheck + test (TS) + ruff/mypy/pytest (Python)
        run: pnpm check
